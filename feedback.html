<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentorship Feedback</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-logo">AMSA Mentorship</div>
  <div class="nav-toggle" id="mobile-menu">
    ☰
  </div>
  <ul class="nav-menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="faq.html">FAQ</a></li>

<section class="feedback-section">
<h1>Share Your Mentorship Experience from last session</h1>
<p>Takes less than 30 seconds.</p>
<form action="https://formspree.io/f/mojknqod" method="POST" class="feedback-form">
<select name="role" required>
<option value="">Select</option>
<option value="mentor">Mentor</option>
<option value="mentee">Mentee</option>
</select>
<select name="rating" required>
<option value="">Select</option>
<option>⭐⭐⭐⭐⭐ Excellent</option>
<option>⭐⭐⭐⭐ Very Good</option>
<option>⭐⭐⭐ Good</option>
<option>⭐⭐ Fair</option>
<option>⭐ Poor</option>
</select>
<textarea name="positive" rows="4"></textarea>
<textarea name="improve" rows="4"></textarea>
<textarea name="testimonial" rows="3"></textarea>
</form>
</section>
<script>
const menu = document.getElementById("mobile-menu");
const navMenu = document.querySelector(".nav-menu");

menu.addEventListener("click", () => {
navMenu.classList.toggle("active");
});
</script>
</body>
